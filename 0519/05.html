<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let date = new Date();
        let year = date.getFullYear();
        let month = date.getMonth() + 1;
        let day = date.getDate();
        let hours = date.getHours(); //24시간제
        let minutes = date.getMinutes();
        let seconds = date.getSeconds();

        let meridiem = hours < 12 ? "오전" : "오후";
      
        if (hours > 12) {
            hours -= 12; // 24시간제를 12시간제로 변환
        } else if (hours === 0) {
            hours = 12; // 자정인 경우 12로 표시
        }

        alert(year + "년 " + month + "월 " + day + "일 " + meridiem + " " + hours + "시 " + minutes + "분 " + seconds + "초");
    </script>
</head>
<body>
    
</body>
</html>
