<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @media screen {
            body{
                background-color: lightcoral;
            }
        }
        @media print {
            body{
                background-color: rgb(20, 68, 83);
            }
        }
    </style>
</head>
<body>
    <h1>부모 요소가 float으로 자식 요소를 감싸지 못하는 문제 해결 방법</h1>
    <p>부모 요소에 overflow: hidden; 스타일을 추가하면 float된 자식 요소를 제대로 감쌀 수 있습니다.</p>
</body>
</html>
