<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다크모드 만들기</title>
    <script>
        window.onload = function() {
            let firstH1 = document.getElementById("first_h1");
            firstH1.style.color = "white";
            firstH1.style.backgroundColor = "red";
            firstH1.innerHTML = "첫 번째 h1 요소입니다.";
        }
        function changeToDarkMode() {

            document.body.style.backgroundColor = "black";
            document.body.style.color = "white";

            let firstH1 = document.getElementById("first_h1");

            firstH1.style.color = "white";

            firstH1.style.backgroundColor = "cyan";
        }

    </script>
</head>
<body>
    <h1 id="first_h1">DOM(Document Object Model)</h1>
    <button onclick="changeToDarkMode()">다크모드 적용</button>
    <button onclick="window.location.reload()">다크모드 해제</button>
</body>
</html>
