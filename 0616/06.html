    <title>Document</title>
     <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
     <script>
        $(document).ready(
            function(){
                $("#btn_fadetoggle").click(
                    function(){
                        $(".page").fadeToggle(2000);
                    }
                );
                $("#btn_toggle").click(
                    function(){
                        $(".page").toggle(2000);
                    }
                );
                $("#btn_slide").click(
                    function(){
                        $(".page").slideToggle(2000);

                );
            }
        );
     </script>
