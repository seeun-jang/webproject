<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .div1 {
            width: 300px;
            height: 300px;
            background-color: rgb(250, 204, 242);
            color: white;
            border: 10px double rgb(165, 156, 156);
            margin: 50px 50px 0 50px;
            padding: 0 50px 0 50px;
            text-align: center; 
            line-height: 300px;
        }
        .div2 {
            width: 400px;
            height: 400px;
            background-color: rgb(252, 154, 208);
            color: white;
            border: 20px ridge rgb(194, 187, 187);
            margin: 50px 50px 0 50px;
            padding: 50px;
            text-align: center; 
            line-height: 400px;
        }
        .div3 {
            width: 500px;
            height: 500px;
            background-color: rgb(255, 131, 203);
            color: white;
            border: 20px groove rgb(185, 176, 176);
            border-width: 30px;
            border-color: rgb(145, 145, 145);
            margin: 50px 50px 0 50px;
            padding: 0 50px 0 50px;
            text-align: center; 
            line-height: 500px;
        }
    </style>
</head>
<body>
    <div class="div1">박스 속성과 값을 설정하는 방법</div>
    <div class="div2">박스 속성과 값을 설정하는 방법</div>
    <div class="div3">박스 속성과 값을 설정하는 방법</div>
</body>
</html>
