<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구조선택자</title>
    <!-- 구조선택자 예제 -->
    <style>
        li > a:first-child > a {
            color: rgb(206, 16, 120);
        }
    </style>
</head>
<body>
    <ul>
    <li><a href="#">첫 번째</a></li>
    <li><a href="#">두 번째</a></li>
    <li><a href="#">세 번째</a></li>
    <li><a href="#">네 번째</a></li>
    <li><a href="#">다섯 번째</a></li>
    <li><a href="#">여섯 번째</a></li>
    </ul>
</body>
</html>
