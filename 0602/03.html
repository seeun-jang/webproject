<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>요소객체 속성 조작</title>

    <script>
        // textContent, innerHTML
        window.onload = function(){
            let img1 = document.getElementById("img1");

            // img1.src = "https://placehold.co/300x200";
            img1.src = "imgs/background1.jpg";
            img1.width = 600;
            img1.height = 400;
        }

        function changeImage() {
            let img1 = document.getElementById("img1");
            img1.src = "imgs/water.jpg";
        }
    </script>
</head>
<body>
    <button onclick="changeImage()">이미지 변경하기</button>
    <br><br>
    <img id="img1">
</body>
</html>
