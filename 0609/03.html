<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- jQuery library -->
    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
    <!-- jQuery 문법으로 코드 작성 -->
     <script>
        $(document).ready(function(){
            $("#second").css("color", "magenta");
            $("#second").css("background-color", "black");
            $(".third").css("color", "cyan");
            $(".third").css("background-color", "gray");
        });
    </script>
</head>
<body>
    <h1>jQuery 라이브러리 설정 및 문법</h1>
    <h1 id="second">jQuery 라이브러리 설정 및 문법</h1>
    <h1 class="third">jQuery 라이브러리 설정 및 문법</h1>
</body>
</html>
