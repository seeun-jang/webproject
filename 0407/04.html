<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS3-태그선택자 사용방법</title>
    <style>
        h1{
            color: rgba(180, 180, 180, 0.815);
            background-color: rgb(255, 220, 249);
        }
        p{
            color: rgb(24, 22, 22);
            background-color: #a69ce0;
        }

        #p1{
            color: white;
            background-color: black;
        }
    </style>
</head>
<body>
    <h1>한국폴리텍대학</h1>
    <h2>인공지능소프트웨어과</h2>
    <h1>웹프로그래밍기초</h1>
    <p>태그 선택자 연습을 위한 문서입니다.</p>
    <p id="p1">태그 선택자 연습을 위한 문서입니다.</p>
    <p id="p1">태그 선택자 연습을 위한 문서입니다.</p>
    <p>태그 선택자 연습을 위한 문서입니다.</p>
</body>
</html>
